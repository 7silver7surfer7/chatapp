apiVersion: v1
kind: Service
metadata:
  name: chatapp
  namespace: chatapp
  annotations:
    # Network Load Balancer instead of the legacy Classic ELB
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: chatapp
  ports:
    - name: http
      port: 80
      targetPort: 3000
