<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">
        <span class="logo">✦</span>
        <h1>Gemini Chat</h1>
      </div>
      <button id="new-chat" class="ghost-btn" title="Start a new conversation">New chat</button>
    </header>

    <main id="messages" class="messages">
      <div class="welcome">
        <span class="logo big">✦</span>
        <h2>How can I help you today?</h2>
        <p>Powered by Google Gemini</p>
      </div>
    </main>

    <footer class="composer">
      <form id="chat-form">
        <textarea
          id="input"
          rows="1"
          placeholder="Message Gemini…"
          autocomplete="off"
          autofocus
        ></textarea>
        <button id="send" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/>
          </svg>
        </button>
      </form>
      <p class="disclaimer">Gemini can make mistakes. Verify important information.</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
